case:
  id: full_generation_003
  scenario: full_generation
  title: 生成新闻行业内容创作者平台元服务工程
  prompt: 从零生成一个新闻内容创作者平台元服务，面向C端内容生产者，核心链路为创作→编辑→提交审核→发布→数据反馈。包含文章编辑器、素材管理、发布审核流程和创作者数据面板，使用Navigation路由和V2状态管理。不同于现有新闻模板的C端消费视角，本工程从内容生产者视角构建完整创作与发布链路。
  output_requirements: 请从零完成完整工程生成，并说明新增了哪些文件、主要实现内容及最终效果。
constraints:
- id: HM-FULL-003-01
  name: 工程必须使用Navigation和NavPathStack进行页面路由，禁止使用router
  priority: P0
  rules:
  - target: '**/EntryAbility.ets'
    ast:
    - type: call
      name: NavPathStack
    llm: 检查是否使用NavPathStack管理导航栈，而非旧版router
  description: 工程必须使用Navigation和NavPathStack进行页面路由，禁止使用router
- id: HM-FULL-003-02
  name: 状态管理必须使用V2装饰器（@ComponentV2、@Local、@Param、@ObservedV2、@Trace）
  priority: P0
  rules:
  - target: '**/*.ets'
    ast:
    - type: decorator
      name: ComponentV2
    llm: 检查是否全面使用@ComponentV2而非@Component
  description: 状态管理必须使用V2装饰器（@ComponentV2、@Local、@Param、@ObservedV2、@Trace）
- id: HM-FULL-003-03
  name: 文章编辑状态必须使用可追踪的状态管理，支持草稿、审核、发布等状态流转
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: ObservedV2
    - type: decorator
      name: Trace
    llm: 检查文章数据模型是否使用@ObservedV2和@Trace追踪编辑状态变化
  description: 文章编辑状态必须使用可追踪的状态管理，支持草稿、审核、发布等状态流转
- id: HM-FULL-003-04
  name: 创作者数据面板必须使用@Computed派生计算阅读量和互动指标
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: Computed
    llm: 检查数据统计是否使用@Computed派生状态计算阅读量和互动数据
  description: 创作者数据面板必须使用@Computed派生计算阅读量和互动指标
- id: HM-FULL-003-05
  name: 工程结构必须包含完整的模块分层（pages/components/models/services/constants）
  priority: P1
  rules:
  - target: '**/*'
    llm: 检查是否按照pages/components/models/services/constants分层组织代码
  description: 工程结构必须包含完整的模块分层（pages/components/models/services/constants）
