case:
  id: full_generation_001
  scenario: full_generation
  title: 生成美食行业餐厅管理后台元服务工程
  prompt: 从零生成一个餐厅管理后台元服务，面向B端商家，核心链路为接单→备餐→出餐→营收分析。包含订单管理看板、菜品上下架管理、厨房出餐状态追踪和经营数据面板，使用Navigation路由和V2状态管理。不同于现有点餐模板的C端消费视角，本工程从商家管理和调度视角构建完整B端链路。
  output_requirements: 请从零完成完整工程生成，并说明新增了哪些文件、主要实现内容及最终效果。
constraints:
- id: HM-FULL-001-01
  name: 工程必须使用Navigation和NavPathStack进行页面路由，禁止使用router
  priority: P0
  rules:
  - target: '**/EntryAbility.ets'
    ast:
    - type: call
      name: NavPathStack
    llm: 检查是否使用NavPathStack管理导航栈，而非旧版router
  description: 工程必须使用Navigation和NavPathStack进行页面路由，禁止使用router
- id: HM-FULL-001-02
  name: 状态管理必须使用V2装饰器（@ComponentV2、@Local、@Param、@ObservedV2、@Trace）
  priority: P0
  rules:
  - target: '**/*.ets'
    ast:
    - type: decorator
      name: ComponentV2
    llm: 检查是否全面使用@ComponentV2而非@Component
  description: 状态管理必须使用V2装饰器（@ComponentV2、@Local、@Param、@ObservedV2、@Trace）
- id: HM-FULL-001-03
  name: 订单状态必须使用可追踪的状态管理，支持实时状态流转（新订单→制作中→出餐→完成）
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: ObservedV2
    - type: decorator
      name: Trace
    llm: 检查订单数据模型是否使用@ObservedV2和@Trace追踪状态变化
  description: 订单状态必须使用可追踪的状态管理，支持实时状态流转（新订单→制作中→出餐→完成）
- id: HM-FULL-001-04
  name: 经营数据面板必须使用@Computed派生计算汇总指标（营收、订单量、时段分析）
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: Computed
    llm: 检查营收汇总和统计数据是否使用@Computed派生状态计算
  description: 经营数据面板必须使用@Computed派生计算汇总指标（营收、订单量、时段分析）
- id: HM-FULL-001-05
  name: 工程结构必须包含完整的模块分层（pages/components/models/services/constants）
  priority: P1
  rules:
  - target: '**/*'
    llm: 检查是否按照pages/components/models/services/constants分层组织代码
  description: 工程结构必须包含完整的模块分层（pages/components/models/services/constants）
