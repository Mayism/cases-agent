case:
  id: full_generation_005
  scenario: full_generation
  title: 生成购物行业商家经营后台元服务工程
  prompt: 从零生成一个商家经营后台元服务，面向B端商家，核心链路为商品上架→订单处理→发货→经营分析。包含商品管理与上下架、订单处理与状态流转、销售数据分析看板和店铺设置，使用Navigation路由和V2状态管理。不同于现有商城模板的C端消费视角，本工程从商家经营视角构建完整B端管理链路。
  output_requirements: 请从零完成完整工程生成，并说明新增了哪些文件、主要实现内容及最终效果。
constraints:
- id: HM-FULL-005-01
  name: 工程必须使用Navigation和NavPathStack进行页面路由，禁止使用router
  priority: P0
  rules:
  - target: '**/EntryAbility.ets'
    ast:
    - type: call
      name: NavPathStack
    llm: 检查是否使用NavPathStack管理导航栈，而非旧版router
  description: 工程必须使用Navigation和NavPathStack进行页面路由，禁止使用router
- id: HM-FULL-005-02
  name: 状态管理必须使用V2装饰器（@ComponentV2、@Local、@Param、@ObservedV2、@Trace）
  priority: P0
  rules:
  - target: '**/*.ets'
    ast:
    - type: decorator
      name: ComponentV2
    llm: 检查是否全面使用@ComponentV2而非@Component
  description: 状态管理必须使用V2装饰器（@ComponentV2、@Local、@Param、@ObservedV2、@Trace）
- id: HM-FULL-005-03
  name: 商品和订单状态必须使用可追踪的状态管理，支持多状态流转
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: ObservedV2
    - type: decorator
      name: Trace
    llm: 检查商品和订单数据是否使用@ObservedV2和@Trace追踪状态变化
  description: 商品和订单状态必须使用可追踪的状态管理，支持多状态流转
- id: HM-FULL-005-04
  name: 数据分析看板必须使用@Computed派生计算销售统计与排行指标
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: Computed
    llm: 检查统计汇总是否使用@Computed派生状态而非手动计算
  description: 数据分析看板必须使用@Computed派生计算销售统计与排行指标
- id: HM-FULL-005-05
  name: 工程结构必须包含完整的模块分层（pages/components/models/services/constants）
  priority: P1
  rules:
  - target: '**/*'
    llm: 检查是否按照pages/components/models/services/constants分层组织代码
  description: 工程结构必须包含完整的模块分层（pages/components/models/services/constants）
