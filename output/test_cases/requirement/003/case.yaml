case:
  id: requirement_003
  scenario: requirement
  title: 实现商城购物车与结算链路需求
  prompt: 基于当前已有的商城首页和商品分类页，继续开发购物车页、数量调整和结算摘要链路，不要重做现有商品浏览能力。
  output_requirements: 请基于 original_project 完成需求实现，保留现有首页，并说明新增页面、组件和导航链路。
constraints:
- id: HM-REQ-003-01
  name: 新增购物车页面，并支持从现有首页进入购物车
  priority: P0
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: file_exists
      name: '**/CartPage.ets'
    - type: navigation
      target: CartPage
    llm: 检查首页是否有入口跳转到购物车页面
  description: 新增购物车页面，并支持从现有首页进入购物车
- id: HM-REQ-003-02
  name: 购物车页面至少支持数量调整、商品删除和总价汇总
  priority: P1
  rules:
  - target: '**/CartPage.ets'
    ast:
    - type: call
      name: Text
    llm: 检查页面是否实现了数量调整、商品删除和总价汇总的逻辑
  description: 购物车页面至少支持数量调整、商品删除和总价汇总
- id: HM-REQ-003-03
  name: 总价和勾选汇总建议使用派生状态实现
  priority: P1
  rules:
  - target: '**/CartPage.ets'
    ast:
    - type: decorator
      name: Computed
    llm: 检查是否使用 @Computed 或类似派生状态计算总价和勾选汇总
  description: 总价和勾选汇总建议使用派生状态实现
