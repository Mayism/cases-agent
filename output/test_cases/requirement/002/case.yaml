case:
  id: requirement_002
  scenario: requirement
  title: 实现新闻详情与相关推荐链路需求
  prompt: 基于当前已有的新闻资讯流首页，继续开发新闻详情页、相关推荐区域和详情到详情的跳转链路，不要重做现有首页。
  output_requirements: 请基于 original_project 完成需求实现，保留现有首页，并说明新增页面、组件和导航链路。
constraints:
- id: HM-REQ-002-01
  name: 补齐新闻详情页，并支持从现有新闻卡片点击进入详情阅读
  priority: P0
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: file_exists
      name: '**/NewsDetail*.ets'
    - type: navigation
      target: NewsDetail
    llm: 检查是否有入口跳转到新闻详情页面
  description: 补齐新闻详情页，并支持从现有新闻卡片点击进入详情阅读
- id: HM-REQ-002-02
  name: 详情页需要展示标题、来源、正文和相关推荐区域
  priority: P1
  rules:
  - target: '**/NewsDetail*.ets'
    ast:
    - type: call
      name: Text
    llm: 检查页面是否包含标题、来源、正文和相关推荐区域的渲染逻辑
  description: 详情页需要展示标题、来源、正文和相关推荐区域
- id: HM-REQ-002-03
  name: 点击相关推荐后应继续进入另一条详情，形成可复用的详情链路
  priority: P1
  rules:
  - target: '**/NewsDetail*.ets'
    ast:
    - type: navigation
      target: NewsDetail
    llm: 检查点击相关推荐是否能跳转到新的详情页
  description: 点击相关推荐后应继续进入另一条详情，形成可复用的详情链路
