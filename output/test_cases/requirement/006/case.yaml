case:
  id: requirement_006
  scenario: requirement
  title: 实现新闻资讯元服务接入位置服务获取设备位置信息需求
  prompt: 这是一个增量开发需求。基于当前已有的新闻资讯元服务工程，继续扩展“本地资讯”能力，不要重做现有首页新闻流、顶部轮播和详情阅读链路。围绕“进入首页→按需授权定位→获取设备当前位置→展示当前城市或本地频道→刷新本地资讯内容”构建完整闭环。首页需新增当前位置展示区和手动刷新入口，首次进入或用户主动刷新时按需申请定位权限，在授权成功后通过 Location Kit 获取设备位置信息，用于更新首页的城市标识、本地推荐文案或本地新闻分组；拒绝授权时需要提供清晰但不打断阅读的降级提示，并允许继续浏览通用新闻内容。位置能力需要复用现有 PermissionUtil 与首页列表刷新机制，使用 V2 状态管理维护授权状态、定位结果与本地资讯展示状态。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，保留现有首页与新闻详情阅读链路，并在回复中说明新增的位置展示区域、权限处理逻辑和关键配置文件。
constraints:
  - id: HM-REQ-010-01
    name: 首页必须新增当前位置或本地频道展示区，并支持用户主动刷新定位结果
    description: 首页必须新增当前位置或本地频道展示区，并支持用户主动刷新定位结果
    priority: P0
    rules:
      - target: '**/Home*.ets'
        llm: 检查首页是否新增当前位置、本地频道或本地资讯展示区，并提供手动刷新入口，而不是只在后台静默获取位置
  - id: HM-REQ-010-02
    name: 必须按需申请定位权限并通过 Location Kit 获取设备当前位置
    description: 必须按需申请定位权限并通过 Location Kit 获取设备当前位置
    priority: P0
    rules:
      - target: '**/*.ets'
        ast:
          - type: call
            name: getCurrentLocation
        llm: 检查是否完成了权限申请与 Location Kit 定位调用，能够实际获取设备当前位置，而不是仅停留在字符串、注释或模拟状态
  - id: HM-REQ-010-03
    name: 定位结果必须驱动首页城市标识或本地资讯内容更新，拒绝授权时要有非阻断式降级
    description: 定位结果必须驱动首页城市标识或本地资讯内容更新，拒绝授权时要有非阻断式降级
    priority: P1
    rules:
      - target: '**/*.ets'
        llm: 检查定位成功后是否利用位置信息更新首页城市标识、本地资讯文案或分组内容，并在用户拒绝授权时仍可继续浏览通用新闻内容
  - id: HM-REQ-010-04
    name: 必须复用现有首页刷新链路和权限工具，以增量方式完成位置能力接入
    description: 必须复用现有首页刷新链路和权限工具，以增量方式完成位置能力接入
    priority: P1
    rules:
      - target: '**/*.ets'
        llm: 检查是否复用了现有 PermissionUtil、首页刷新或列表更新机制来接入定位能力，而不是推倒重做首页结构
