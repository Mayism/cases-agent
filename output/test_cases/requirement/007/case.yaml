case:
  id: requirement_007
  scenario: requirement
  title: 实现景区元服务接入MapKit并默认展示当前位置需求
  prompt: 这是一个基于空白元服务工程的增量开发需求。请实现一个面向游客的景区导览元服务首页，以地图作为核心主视图，围绕“进入首页→按需申请定位权限→接入
    MapKit 地图→默认展示设备当前位置→浏览景区导览信息”构建完整体验。首页首屏需要展示地图区域、当前位置标识和景区导览信息区，首次进入页面或用户主动触发定位时按需申请位置权限，授权成功后通过定位能力获取设备当前位置，并让地图默认以当前位置为中心进行展示；如果定位失败或用户拒绝授权，需要提供可继续浏览景区导览内容的降级态，但不能阻断页面使用。页面信息层可包含景区名称、推荐游览点、游览提示或快捷入口，整体保持元服务轻量化，使用
    V2 状态管理维护地图展示状态、授权状态和当前位置数据。
  output_requirements: 请基于 original_project 完成景区元服务地图导览首页实现，并在回复中说明地图主视图放置位置、当前位置默认展示逻辑、定位权限处理方式、降级态设计以及涉及的关键页面与配置文件。
constraints:
- id: HM-REQ-007-01
  name: 首页必须接入 MapKit 地图组件并将地图作为景区导览主视图
  priority: P0
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: call
      name: MapComponent
    llm: 检查首页或核心导览页是否真实接入了 MapKit 的 MapComponent 作为地图主视图，而不是仅使用静态图片、占位色块或文本模拟地图
  description: 首页必须接入 MapKit 地图组件并将地图作为景区导览主视图
- id: HM-REQ-007-02
  name: 必须按需申请位置权限并获取设备当前位置用于地图默认展示
  priority: P0
  rules:
  - target: '**/*.ets'
    ast:
    - type: call
      name: requestPermissionsFromUser
    - type: call
      name: getCurrentLocation
    llm: 检查工程是否按需申请定位权限并实际调用定位能力获取当前位置，且该位置结果被用于地图默认中心点或当前位置展示，而不是仅停留在变量声明或伪代码描述
  description: 必须按需申请位置权限并获取设备当前位置用于地图默认展示
- id: HM-REQ-007-03
  name: 页面必须展示当前位置信息或对应定位状态，并提供景区导览信息区
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    llm: 检查页面是否存在当前位置文案、定位中状态或定位结果展示区域，并同时提供景区名称、游览提示、推荐景点或导览入口等景区业务信息，而不是只有一张空地图
  description: 页面必须展示当前位置信息或对应定位状态，并提供景区导览信息区
- id: HM-REQ-007-04
  name: 拒绝授权或定位失败时必须提供不阻断浏览的降级体验
  priority: P1
  rules:
  - target: '**/*.ets'
    llm: 检查当用户拒绝定位权限或定位失败时，页面是否提供清晰的提示与可继续浏览的降级态，例如继续浏览景区导览信息、手动重试定位或展示默认景区区域，而不是直接报错退出或白屏
  description: 拒绝授权或定位失败时必须提供不阻断浏览的降级体验
- id: HM-REQ-007-05
  name: 工程配置中必须包含地图与定位相关的基础权限声明
  priority: P1
  rules:
  - target: '**/module.json5'
    llm: 检查工程配置是否补充了地图与定位场景所需的基础权限声明，至少应覆盖位置权限相关配置，保证当前位置展示链路具备运行前提
  description: 工程配置中必须包含地图与定位相关的基础权限声明
