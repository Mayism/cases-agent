case:
  id: requirement_009
  scenario: requirement
  title: 新闻模板集成Location Kit自动定位功能
  prompt: 在现有的新闻元服务模板（NewsTemplate）基础上，集成Location Kit实现自动定位当前位置功能。需要完成以下工作：1. 在首页标题栏显示当前位置信息；2.
    页面加载时自动获取设备位置；3. 支持手动点击刷新位置；4. 使用模拟数据展示城市名称（因原子化服务不支持逆地理编码）；5. 正确处理定位权限请求流程。
  output_requirements: 请基于 original_project 完成需求实现，并说明新增页面、组件和导航链路。
constraints:
- id: HM-REQ-009-01
  name: LocationUtil工具类必须正确实现
  priority: P0
  rules:
  - target: '**/commonLib/src/main/ets/utils/LocationUtil.ets'
    ast:
    - type: class
      name: LocationUtil
    - type: method
      name: getCurrentLocation
    - type: method
      name: checkLocationPermission
    - type: method
      name: requestLocationPermission
    llm: LocationUtil类必须包含获取当前位置、检查权限、请求权限的核心方法
  description: LocationUtil工具类必须正确实现
- id: HM-REQ-009-02
  name: 首页必须集成位置显示功能
  priority: P0
  rules:
  - target: '**/home/src/main/ets/pages/HomePage.ets'
    ast:
    - type: import
      name: LocationUtil
    - type: call
      name: autoLocate
    llm: 首页必须导入LocationUtil并在页面加载时调用自动定位方法
  description: 首页必须集成位置显示功能
- id: HM-REQ-009-03
  name: HomePageVM必须包含位置状态管理
  priority: P0
  rules:
  - target: '**/home/src/main/ets/viewModels/HomePageVM.ets'
    ast:
    - type: decorator
      name: '@Trace'
    - type: property
      name: currentCity
    - type: property
      name: isLocating
    - type: method
      name: autoLocate
    llm: HomePageVM必须使用@Trace管理位置相关状态（currentCity、isLocating），并实现autoLocate方法
  description: HomePageVM必须包含位置状态管理
- id: HM-REQ-009-04
  name: 位置权限配置必须正确
  priority: P1
  rules:
  - target: '**/entry/src/main/module.json5'
    llm: module.json5中必须配置ohos.permission.APPROXIMATELY_LOCATION和ohos.permission.LOCATION权限
  description: 位置权限配置必须正确
- id: HM-REQ-009-05
  name: 定位请求配置必须符合API规范
  priority: P1
  rules:
  - target: '**/commonLib/src/main/ets/utils/LocationUtil.ets'
    ast:
    - type: call
      name: geoLocationManager.getCurrentLocation
    llm: SingleLocationRequest必须包含locatingTimeoutMs和locatingPriority两个必填字段
  description: 定位请求配置必须符合API规范
- id: HM-REQ-009-06
  name: 原子化服务约束必须遵守
  priority: P1
  rules:
  - target: '**/commonLib/src/main/ets/utils/LocationUtil.ets'
    llm: 由于原子化服务不支持getAddressesFromLocation逆地理编码API，需使用getMockGeoAddress方法根据坐标范围返回模拟城市数据
  description: 原子化服务约束必须遵守
- id: HM-REQ-009-07
  name: commonLib必须导出LocationUtil
  priority: P1
  rules:
  - target: '**/commonLib/Index.ets'
    ast:
    - type: export
      name: LocationUtil
    llm: commonLib的Index.ets必须导出LocationUtil类和相关接口类型
  description: commonLib必须导出LocationUtil
