case:
  id: bug_fix_004
  scenario: bug_fix
  title: 修复ForEach数据源更改界面不刷新的缺陷
  prompt: '参照官方 FAQ（faqs-arkui-353）的指导，复现并修复在使用 ForEach 或 LazyForEach 循环渲染时，更改了对象内部的深层数据源属性，但界面
    UI 没有同步刷新的缺陷。

    未提供模板来源，请先构造一个可复现该缺陷的 HarmonyOS 原始场景和原始代码，再在此基础上完成修复。

    问题现象：页面在使用 ForEach 渲染对象列表数据时，当用户触发交互（如点击按钮）修改了列表中某个元素的内部属性，因为缺乏深层状态追踪，底层数据已变但界面
    UI 没有任何刷新。

    修复目标：

    - 重构列表元素的数据模型类，引入深层状态观察机制。

    - 确保产生交互修改状态后，UI 能够同步实时响应。'
  output_requirements: 请先在 original_project 中构造原始缺陷场景和原始代码，再基于该 original_project 完成修复，并说明场景构造方式、根因、修复点和修改文件。
constraints:
- id: HM-BUGFIX-004-01
  name: 列表数据模型必须使用深层可追踪装饰器修饰
  priority: P0
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: ObservedV2
    - type: decorator
      name: Trace
    llm: 检查列表所用的数据模型类是否使用了 @ObservedV2 装饰，且需要改变的属性是否使用了 @Trace 装饰
  description: 列表数据模型必须使用深层可追踪装饰器修饰
- id: HM-BUGFIX-004-02
  name: 列表渲染必须包含修改深层属性的交互逻辑
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: call
      name: ForEach
    llm: 检查 ForEach 内部的组件渲染逻辑中，是否包含能触发对应数据源属性变更的事件（如 onClick）
  description: 列表渲染必须包含修改深层属性的交互逻辑
