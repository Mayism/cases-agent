case:
  id: bug_fix_002
  scenario: bug_fix
  title: 修复商城购物车状态同步缺陷
  prompt: 修复购物车商品数量修改后价格不更新的问题
  output_requirements: 请基于 original_project 修复缺陷，并说明根因、修复点和修改文件。
constraints:
- id: HM-BUGFIX-002-01
  name: 商品状态需要使用可追踪的状态管理
  priority: P0
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: ObservedV2
    - type: decorator
      name: Trace
    llm: 检查商品项是否使用 @ObservedV2 和 @Trace 追踪状态变化
  description: 商品状态需要使用可追踪的状态管理
- id: HM-BUGFIX-002-02
  name: 总价计算需要使用派生状态实现
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: decorator
      name: Computed
    llm: 检查是否使用 @Computed 派生状态计算总价
  description: 总价计算需要使用派生状态实现
- id: HM-BUGFIX-002-03
  name: 数量变化后必须实时刷新价格展示
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: call
      name: Text
    llm: 检查数量调整逻辑是否能实时触发总价更新和展示
  description: 数量变化后必须实时刷新价格展示
