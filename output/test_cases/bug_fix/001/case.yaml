case:
  id: bug_fix_001
  scenario: bug_fix
  title: 修复点餐页面购物车列表刷新异常
  prompt: 修复点餐页面购物车数量更新后界面不刷新的问题
  output_requirements: 请基于 original_project 修复缺陷，并说明根因、修复点和修改文件。
constraints:
- id: HM-BUGFIX-001-01
  name: 购物车项更新需要通过可追踪的状态变更驱动
  priority: P0
  rules:
  - target: '**/commons/common/src/main/ets/models/StorageModel.ets'
    ast:
    - type: decorator
      name: ObservedV2
    - type: decorator
      name: Trace
    llm: 检查购物车数据是否使用可追踪的状态变更驱动
  description: 购物车项更新需要通过可追踪的状态变更驱动
- id: HM-BUGFIX-001-02
  name: 购物车列表渲染需要使用稳定key
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: call
      name: ForEach
    llm: 检查ForEach是否使用稳定属性作为key
  description: 购物车列表渲染需要使用稳定key
