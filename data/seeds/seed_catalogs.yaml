# =============================================================================
# 用例生成原则（seed_catalogs.yaml 头部说明）
# =============================================================================
#
# 本文件定义三类场景（requirement / bug_fix / full_generation）的种子，
# 每颗种子对应一条完整的测试用例生成规格。新增行业的种子应遵循以下原则：
#
# ─── requirement（增量开发）───
# 以所选行业模板为基础，按以下四个方向依次生成用例，优先级从高到低：
#   P1  平台能力接入：接入 HarmonyOS 差异化能力（如地图定位、推送通知、生物识别、服务卡片 Widget）
#   P2  交互体验增强：转场动画、深色模式、折叠屏适配等体验打磨
#
# 每个 requirement 种子必须：
#   - 明确 existing_features（模板已有能力）和 new_requirement_scope（本次新增范围）
#   - 通过 template_constraints 约束"保留现有首页、增量扩展、不推翻重做"
#   - 关联正确的 starter_kind 指向初始工程
#
# ─── full_generation（完整工程生成）───
# 从已有模板确定的范式象限中，寻找空象限并选择最有行业代表性的场景新增模板。
#
#   范式象限由两个轴决定：
#     用户轴：C端（消费者）  ←→  B端（商家/从业者）
#     动作轴：消费型（浏览/下单/支付）  ←→  生产型（发布/管理/调度）
#
#   四象限示例：
#     C端+消费型 → 点餐、商城浏览、新闻阅读（已有模板通常落在此象限）
#     C端+生产型 → 菜谱发布、内容创作、UGC（内容生产方向）
#     B端+消费型 → 外卖调度、采购下单（批量/调度方向）
#     B端+生产型 → 餐厅管理、商家后台、经营分析（驾驶舱方向）
#
#   选取原则：
#   1. 每个行业的每颗 full_generation 种子必须落在与同行业已有模板不同的象限
#   2. 在空象限中选择该行业最高频、最具代表性的场景
#   3. 核心链路必须与已有模板本质不同（更换链路而非更换皮肤）
#
# ─── bug_fix（缺陷修复）───
# 结合输入直接构造缺陷修复场景；如果指定模板，则在模板基础上生成用例，否则先构造原始问题场景与原始代码。
#
#   选取原则：
#   1. 优先从输入里提炼真实的 HarmonyOS / ArkTS 缺陷现象，问题应与目标链路直接相关
#   2. 如果指定模板，则在最贴合问题场景的模板上组织缺陷修复用例；
#      如果未指定模板，则先构造最小可复现的原始缺陷代码与场景
#   3. 约束（constraints）必须明确指向修复目标，包含 AST 规则以验证修复是否正确
#      （如"购物车数量不刷新"在美食行业是"菜品数量"，在新闻行业是"收藏列表刷新"）
#
# ─── 通用规则 ───
#   - 同一行业的三类场景种子应尽量使用同一个行业模板（template.name）或其衍生版本，
#     保持行业一致性
#   - 每颗种子的 constraints 必须包含至少 1 条 P0 级约束和 1 条 P1 级约束，
#     P0 约束通常检查平台强约束（Navigation/V2 装饰器等），P1 约束检查场景特定实现
#   - bug_fix 场景统一基于 original_project 修复；
#     如果明确指定 template_project，则以该模板作为 original_project；
#     如果未指定，则先在 original_project 中构造问题场景与原始代码，再结合输入生成用例
#   - bug_fix 场景最低只要求提供 input；
#     problem_statement、fix_targets 可作为补充信息按需填写
#   - requirement 场景统一基于 original_project 实现；
#     优先指定 template_project 作为 original_project 做增量开发；
#     如果未说明基于什么模板做需求开发，则默认使用空工程作为 original_project
#   - full_generation 场景不需要 template_project，因为是从零生成完整工程
#   - starter_kind 仅在 template_project 指定的模板基础上做增量覆盖（如注入缺陷代码），
#     当 template_project 有效时，starter_kind 为可选项
#   - keywords 应包含行业关键词、业务关键词和 ArkTS 技术关键词，用于场景匹配打分
#   - title 命名规范（必填，按场景类型遵循固定前缀）：
#       requirement → 实现{行业}{功能}需求   例：实现点餐优惠券中心与订单详情需求
#       bug_fix      → 修复{场景}{问题}缺陷    例：修复点餐页面购物车列表刷新异常
#       full_generation → 生成{行业}{场景}工程  例：生成美食行业餐厅管理后台工程
#   - 行业模板来源：https://github.com/AppGalleryConnect/agc-template-market-harmonyos-demos
#     使用前需将对应模板仓库克隆到 resources/templates/ 目录下，目录名与 template_project 一致
#     例如 template_project 为 FoodAndDrinkTemplate/CateringOrders 时，
#     对应路径为 resources/templates/FoodAndDrinkTemplate/CateringOrders/
#
# =============================================================================

requirement:
  - seed_id: req_catering_coupon_extension
    title: 实现点餐优惠券中心与订单详情需求
    input: 基于当前已有的点餐首页和个人中心，继续开发优惠券中心、订单详情和结算链路，不要重做现有的首页和购物车。
    template_project: FoodAndDrinkTemplate/CateringOrders
    keywords:
      - 点餐
      - 餐饮
      - 优惠券
      - 订单详情
      - 结算
      - 购物车
      - 提交订单
      - 店铺选择
      - 商品规格
      - 钱包支付
      - CateringOrders
    template:
      name: CateringOrders
      industry: 美食
      app_type: 元服务
    existing_features:
      - 首页城市选择、banner位、扫一扫、预约订座、排队取号
      - 店铺选择/详情/位置导航/电话、商品列表/搜索/详情/规格、购物车/清空/修改数量/下单
      - 个人中心、钱包充值/账单明细、优惠券列表、积分、帮助中心
    new_requirement_scope:
      - 在个人中心新增优惠券快捷入口，并跳转到优惠券中心页面。
      - 优惠券中心页至少要展示可用优惠券和即将过期优惠券，并支持基础切换或筛选。
      - 新增订单详情页，支持查看已完成订单的详情信息。
    template_constraints:
      - 必须复用现有点餐首页布局和信息层级，不能整体推翻重做。
      - 新增能力应以增量扩展的方式接入，例如新增页面或新增组件。
      - 保留现有首页内容，并确保新增导航链路可以端到端使用。
    starter_kind: requirement_catering_coupon_extension
    constraints:
      - name: 在个人中心新增优惠券入口，并跳转到优惠券中心页面
        priority: P0
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: navigation
                target: MyCouponsPage
            llm: 检查是否有入口跳转到优惠券中心页面
      - name: 优惠券中心页至少要展示可用优惠券和即将过期优惠券，并支持基础切换或筛选
        priority: P1
        rules:
          - target: "**/pages/MyCouponsPage.ets"
            ast:
              - type: call
                name: Tabs
              - type: call
                name: ForEach
            llm: 检查页面是否展示分组和筛选控件
      - name: 新增订单详情页，支持查看已完成订单的详情信息
        priority: P1
        rules:
          - target: "**/pages/*Order*.ets"
            ast:
              - type: file_exists
                name: "**/pages/*Order*.ets"
            llm: 检查是否有订单详情页面展示订单信息
      - name: 必须复用现有点餐首页布局，不能整体推翻重做
        priority: P1
        rules:
          - target: "**/pages/Index.ets"
            ast:
              - type: rule_ref
                name: must_keep_file
            llm: 检查是否保留了现有首页结构

  - seed_id: req_news_detail_extension
