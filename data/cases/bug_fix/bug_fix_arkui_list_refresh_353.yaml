case:
  id: bug_fix_arkui_list_refresh_353
  scenario: bug_fix
  title: 修复ForEach数据源更改界面不刷新的缺陷
  input: 复现并修复在使用 ForEach 或 LazyForEach 循环渲染时，更改对象内部的深层数据源属性后，界面 UI 没有同步刷新的缺陷。
  keywords:
    - ForEach
    - LazyForEach
    - 状态同步
    - UI不刷新
    - ObservedV2
    - Trace
  problem_statement: 页面在使用 ForEach 渲染对象列表数据时，当用户触发交互（如点击按钮）修改了列表中某个元素的内部属性，因为缺乏深层状态追踪，底层数据已变但界面 UI 没有任何刷新。
  fix_targets:
    - 重构列表元素的数据模型类，引入深层状态观察机制。
    - 确保产生交互修改状态后，UI 能够同步实时响应。
constraints:
  - name: 列表数据模型必须使用深层可追踪装饰器修饰
    priority: P0
    rules:
      - target: "**/pages/*.ets"
        ast:
          - type: decorator
            name: ObservedV2
          - type: decorator
            name: Trace
        llm: 检查列表所用的数据模型类是否使用了 @ObservedV2 装饰，且需要改变的属性是否使用了 @Trace 装饰
  - name: 列表渲染必须包含修改深层属性的交互逻辑
    priority: P1
    rules:
      - target: "**/pages/*.ets"
        ast:
          - type: call
            name: ForEach
        llm: 检查 ForEach 内部的组件渲染逻辑中，是否包含能触发对应数据源属性变更的事件（如 onClick）
