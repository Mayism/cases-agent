case:
  id: requirement_002_mall_atomic_payment_kit
  scenario: requirement
  title: 实现元服务商城接入支付Kit并完成订单支付流程需求
  input: 这是一个基于空白元服务工程的增量开发需求。请实现一个面向消费者的元服务商城支付能力，以支付 Kit 为核心支付能力，围绕"浏览商品→创建订单→发起支付→处理支付结果→订单状态更新"构建完整支付闭环。商城首页需要展示商品列表，用户可浏览商品并选择购买，点击购买后进入订单确认页面，确认后发起支付请求；支付过程中需要接入支付 Kit 的支付能力，处理支付成功、失败、取消等不同状态，支付完成后更新订单状态并展示支付结果；如果支付失败需要提供重试入口，支付取消后订单保留待支付状态。整体保持元服务轻量化，使用 V2 状态管理维护订单数据、支付状态和商品信息，支付相关敏感数据需要妥善处理，不得在日志或界面中泄露支付凭证、签名密钥等安全信息。
  keywords:
    - 元服务商城
    - 支付Kit
    - PaymentKit
    - 订单支付
    - 支付状态
    - 订单管理
  existing_features:
    - 当前 original_project 仅为空白元服务工程，包含默认首页与基础工程结构
    - 尚未接入支付 Kit、订单管理能力与商城业务模块
  new_requirement_scope:
    - 新增商城首页商品列表展示能力
    - 新增订单确认页面，支持订单信息展示与支付发起
    - 新增支付 Kit 接入，完成支付能力对接与支付流程处理
    - 新增支付结果页面，展示支付成功/失败/取消状态并提供后续操作入口
    - 新增订单状态管理，支持待支付、已支付、支付失败等状态流转
  template_constraints:
    - 基于空工程完成增量实现，不要求复刻其他行业模板结构
    - 商城首页必须保留元服务可编译的基础入口，并以商品浏览→订单支付作为核心体验
    - 不要扩展与商城支付无关的新闻、社交、出行等业务模块
    - 支付安全必须符合基础要求，不得泄露支付凭证或密钥信息
  output_requirements: 请基于 original_project 完成元服务商城支付能力实现，并在回复中说明支付 Kit 接入方式、订单支付流程设计、支付状态处理逻辑、支付结果页面设计以及涉及的关键页面与配置文件。
constraints:
  - name: 工程必须接入支付Kit并存在支付相关能力调用
    priority: P0
    rules:
      - target: "**/*.ets"
        ast:
          - type: import
            name: PaymentKit
        llm: 检查工程是否真实接入支付 Kit 模块，存在支付能力相关导入或调用证据，而不是仅停留在伪代码或占位描述
  - name: 必须存在订单创建与支付发起的核心业务流程
    priority: P0
    rules:
      - target: "**/pages/*.ets"
        ast:
          - type: navigation
            target: OrderConfirmPage
          - type: navigation_with_params
        llm: 检查是否存在从商品页面到订单确认页面的导航跳转，以及携带订单参数的支付发起流程，确保支付链路可被完整触发
  - name: 支付结果必须被正确处理并提供状态反馈界面
    priority: P1
    rules:
      - target: "**/pages/*.ets"
        ast:
          - type: navigation
            target: PaymentResultPage
        llm: 检查是否存在支付结果页面，能够展示支付成功、失败、取消等不同状态，并提供订单详情查看或重试支付入口
  - name: 订单状态必须使用V2状态管理并支持状态流转
    priority: P1
    rules:
      - target: "**/*.ets"
        ast:
          - type: decorator
            name: ObservedV2
          - type: property
            name: orderStatus
        llm: 检查订单状态是否使用 V2 状态管理体系进行管理，支持待支付、已支付、支付失败等状态流转，状态变量命名符合业务语义
  - name: 支付敏感信息安全处理不得泄露凭证密钥
    priority: P1
    rules:
      - target: "**/*.ets"
        ast:
          - type: no_call
            name: console.log
        llm: 检查支付相关代码是否存在日志打印支付凭证、签名密钥、用户支付密码等敏感信息的风险行为，确保支付安全基础合规
  - name: 工程配置必须包含支付Kit所需的基础权限与配置声明
    priority: P1
    rules:
      - target: "**/module.json5"
        llm: 检查工程配置是否补充了支付 Kit 场景所需的基础配置声明，保证支付能力链路具备运行前提
