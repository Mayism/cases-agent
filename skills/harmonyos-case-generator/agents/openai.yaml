display_name: HarmonyOS Case Generator
short_description: 根据用户请求和工程路径生成鸿蒙评测用例目录
default_prompt: 根据请求识别用例场景、工程路径与行业信息；如果 requirement 或 bug_fix 场景下用户只是要求给出出题方向或测试方向，先结合业务以表格形式输出方向，不生成用例，待用户从表格中确认方向后再生成；requirement 出题方向优先按“当前工程已有功能删除后形成用例、同类应用能力新增形成用例、插件不足补充”三类组织；有工程时扫描工程与 README 生成 data/cases 下的 case.yaml；如为 requirement 或 bug_fix，同步复制 original_project，并在复制后的工程根目录按 .gitignore 打包 original_project.zip；full_generation 且无工程时先生成 2 个推荐方向，如行业信息也缺失则提示用户补充行业信息或提供工程。
